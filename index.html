<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Lizmo</title>
<meta name="theme-color" content="#0ea5a4">
<link rel="manifest" href="manifest.webmanifest">
<link rel="apple-touch-icon" href="icon-192.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Lizmo">
<style>
  :root{
    --bg:#f4f6f8;--card:#fff;--ink:#1f2733;--muted:#69727e;--line:#e5e9ee;
    --teal:#0ea5a4;--teal-dark:#0b8483;--teal-soft:#e6f7f6;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;padding:0;}
  body{font-family:-apple-system,Roboto,"Segoe UI",Arial,sans-serif;background:var(--bg);color:var(--ink);font-size:18px;line-height:1.4;min-height:100vh;}
  header{background:linear-gradient(135deg,var(--teal),var(--teal-dark));color:#fff;padding:30px 16px 26px;text-align:center;box-shadow:0 2px 14px rgba(15,40,45,.18);}
  .brand{font-size:38px;font-weight:900;letter-spacing:1px;line-height:1;}
  .brand .dot{color:#bdf3ef;}
  header p{margin:10px 0 0;font-size:16px;opacity:.95;}
  #installBar{display:none;background:var(--teal-soft);color:var(--teal-dark);text-align:center;padding:13px 14px;font-weight:700;border-bottom:1px solid #cdeeec;}
  .wrap{padding:18px 14px 30px;max-width:560px;margin:0 auto;}
  .tools{display:flex;flex-direction:column;gap:14px;}
  .tool{display:flex;align-items:center;gap:16px;width:100%;text-align:left;text-decoration:none;background:var(--card);border:2px solid var(--line);border-radius:20px;padding:18px;color:var(--ink);box-shadow:0 1px 4px rgba(0,0,0,.05);transition:transform .08s;}
  .tool:active{transform:scale(.98);}
  .tool .emoji{font-size:38px;flex:0 0 auto;width:58px;height:58px;display:flex;align-items:center;justify-content:center;background:var(--teal-soft);border-radius:16px;}
  .tool .nm{font-size:21px;font-weight:800;line-height:1.15;}
  .tool .bl{font-size:14px;color:var(--muted);margin-top:3px;}
  .tool .tag{display:inline-block;margin-top:6px;font-size:11px;font-weight:700;color:var(--teal-dark);background:var(--teal-soft);border-radius:999px;padding:2px 9px;}
  .tool .arrow{margin-left:auto;color:var(--teal);font-size:26px;font-weight:bold;flex:0 0 auto;}
  .empty{text-align:center;color:var(--muted);padding:50px 16px;}
  footer{text-align:center;color:var(--muted);font-size:12px;padding:20px 20px 4px;}
  .version{text-align:center;color:var(--muted);font-size:11px;letter-spacing:1px;padding-bottom:20px;}
  .beta-pill{display:inline-block;font-size:.62rem;font-weight:700;letter-spacing:2px;color:#0a0a0a;background:#FFB81C;border-radius:4px;padding:2px 8px;vertical-align:middle;margin-left:6px;}
  .guide-overlay{position:fixed;inset:0;background:rgba(20,30,35,.55);z-index:100;display:none;align-items:center;justify-content:center;padding:18px;}
  .guide-overlay.show{display:flex;}
  .guide-card{background:#fff;border-radius:18px;padding:22px;max-width:420px;width:100%;}
  .guide-card h2{margin:0 0 12px;font-size:21px;color:var(--ink);}
  .guide-card ol{padding-left:22px;line-height:1.85;font-size:16px;margin:0;}
  .guide-card p{font-size:15px;margin:0 0 8px;}
  .shareic{display:inline-block;border:1.5px solid currentColor;border-radius:5px;padding:0 6px;font-weight:bold;line-height:1.2;}
  .guide-alt{display:block;width:100%;margin-top:12px;background:#eef1f4;border:none;border-radius:12px;padding:12px;font-size:15px;font-weight:700;color:var(--ink);}
  .guide-close{display:block;width:100%;margin-top:14px;background:var(--teal);color:#fff;border:none;border-radius:14px;padding:14px;font-size:16px;font-weight:800;}
</style>
</head>
<body>
<header>
  <div class="brand">Lizmo<span class="dot">.</span></div>
  <p>Hi Mom! &#128156; Tap whatever you need.</p>
</header>
<div id="installBar" onclick="doInstall()">&#128241; Tap here to add Lizmo to your phone like an app</div>
<div class="wrap">
  <div class="tools" id="tools"></div>
  <footer>Made for you with love &#128156;</footer>
  <div class="version">v1.4</div>
</div>
<div class="guide-overlay" id="installGuide" onclick="if(event.target===this)closeGuide()">
  <div class="guide-card">
    <h2>Add Lizmo to your phone &#128241;</h2>
    <div id="guideSteps"></div>
    <button class="guide-close" onclick="closeGuide()">Got it &#128077;</button>
  </div>
</div>
<script>
// === LIZMO TOOL MENU ============================================
// To ADD a tool: drop a folder in tools/ and add a line here.
// To REMOVE a tool: delete its line here (and its folder).
// ================================================================
const TOOLS = [
  {
    emoji: "\u{1F6CD}️",            // 🛍️ neutral — nothing about what it's for
    name: "Sale Picks",
    blurb: "Tap what you'd like and send it to me",
    href: "tools/picker/",
    tag:  "just for now"                 // remove this line when it's a keeper; whole entry when retired
  }
];
// ================================================================
const box = document.getElementById("tools");
if (TOOLS.length === 0){
  box.innerHTML = `<div class="empty">Nothing here right now &#128075;<br>I'll add something when you need it.</div>`;
} else {
  box.innerHTML = TOOLS.map(t => `
    <a class="tool" href="${t.href}">
      <div class="emoji">${t.emoji}</div>
      <div>
        <div class="nm">${t.name}</div>
        <div class="bl">${t.blurb}</div>
        ${t.tag ? `<span class="tag">${t.tag}</span>` : ""}
      </div>
      <div class="arrow">&#8250;</div>
    </a>`).join("");
}
// PWA install — one button everywhere: real one-tap install on Android/desktop Chrome/Edge,
// guided steps on iPhone/iPad (Apple has no install API), works in-browser elsewhere.
let deferredPrompt=null;
function isIOS(){return /iphone|ipad|ipod/i.test(navigator.userAgent)||(navigator.platform==='MacIntel'&&navigator.maxTouchPoints>1);}
function isIOSSafari(){return isIOS()&&/safari/i.test(navigator.userAgent)&&!/crios|fxios|edgios/i.test(navigator.userAgent);}
function inApp(){return window.matchMedia('(display-mode: standalone)').matches||window.navigator.standalone;}
const _ib=()=>document.getElementById("installBar");
window.addEventListener('beforeinstallprompt',e=>{e.preventDefault();deferredPrompt=e;_ib().style.display='block';});
window.addEventListener('appinstalled',()=>{_ib().style.display='none';});
if(isIOS()&&!inApp()){_ib().style.display='block';}
function doInstall(){
  if(deferredPrompt){deferredPrompt.prompt();deferredPrompt.userChoice.finally(()=>{deferredPrompt=null;_ib().style.display='none';});return;}
  openGuide();
}
function openGuide(){
  const s=document.getElementById('guideSteps');
  if(isIOSSafari()){
    s.innerHTML='<ol><li>Tap the <b>Share</b> button (<span class="shareic">&#x2191;</span>) at the bottom of the screen.</li><li>Scroll down and tap <b>Add to Home Screen</b>.</li><li>Tap <b>Add</b> &mdash; Lizmo lands on your home screen like an app! &#127881;</li></ol>';
  } else if(isIOS()){
    s.innerHTML='<p>On iPhone, apps can only be added from <b>Safari</b>.</p><ol><li>Open this page in <b>Safari</b> (copy the link below).</li><li>Then tap <b>Share</b> (<span class="shareic">&#x2191;</span>) &rarr; <b>Add to Home Screen</b>.</li></ol><button class="guide-alt" onclick="copyLink(event)">&#128203; Copy the link</button>';
  } else {
    s.innerHTML='<p>Open your browser menu and choose <b>Install Lizmo</b> or <b>Add to Home screen</b>.</p>';
  }
  document.getElementById('installGuide').classList.add('show');
}
function closeGuide(){document.getElementById('installGuide').classList.remove('show');}
function copyLink(ev){if(navigator.clipboard)navigator.clipboard.writeText(location.href).then(()=>{if(ev&&ev.target)ev.target.textContent='Copied! ✅';});}
// Auto-update: when a new version is deployed, the new service worker takes over and the app
// silently reloads to the latest (no manual refresh / cache-clearing needed).
if('serviceWorker' in navigator){
  let _refreshing=false;
  const _hadController=!!navigator.serviceWorker.controller;
  navigator.serviceWorker.addEventListener('controllerchange',()=>{if(_refreshing)return;_refreshing=true;if(_hadController)location.reload();});
  window.addEventListener('load',()=>navigator.serviceWorker.register('sw.js').then(reg=>{setInterval(()=>reg.update(),60*60*1000);}).catch(()=>{}));
}
</script>
</body>
</html>
